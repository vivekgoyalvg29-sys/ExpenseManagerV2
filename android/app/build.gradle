plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

android {
    namespace 'vivek.fintrack.app'
    // Keep these pinned to API 36+ for androidx.browser:1.9.0 / androidx.core:1.17.0+.
    compileSdk Integer.parseInt(project.findProperty('fintrack.compileSdk').toString())

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId 'vivek.fintrack.app'
        minSdkVersion flutter.minSdkVersion
        targetSdk Integer.parseInt(project.findProperty('fintrack.targetSdk').toString())
        versionCode 3
        versionName '1.0.2'
    }

    signingConfigs {
        release {
            storeFile file('fintrack.jks')
            storePassword System.getenv('KEY_STORE_PASSWORD')
            keyAlias 'fintrack'
            keyPassword System.getenv('KEY_PASSWORD')
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-auth'
}

// Apply Google Services plugin at the bottom
apply plugin: 'com.google.gms.google-services'
