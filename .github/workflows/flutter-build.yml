name: Build Flutter APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v5

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Generate missing Android wrapper
        run: |
          flutter create --platforms android temp_project
          cp temp_project/android/gradlew android/gradlew
          cp temp_project/android/gradlew.bat android/gradlew.bat
          cp temp_project/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
          cp temp_project/android/local.properties android/local.properties
          rm -rf temp_project

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
